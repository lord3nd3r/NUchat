name: Windows

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Qt6
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.8.*'
          host: windows
          target: desktop
          arch: win64_msvc2022_64
          modules: 'qtquickcontrols2'
          cache: true

      # Python is pre-installed on GitHub-hosted Windows runners.
      # Lua and Hunspell are optional; skip them for the CI build.

      - name: Configure (MSVC)
        run: >
          cmake -B build
          -G "Visual Studio 17 2022" -A x64
          -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Deploy Qt
        shell: pwsh
        run: |
          $exe = "build\src\Release\nuchat.exe"
          if (Test-Path $exe) {
            windeployqt --qmldir qml --no-translations $exe
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nuchat-windows
          path: build/src/Release/
