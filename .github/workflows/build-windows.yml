name: Windows

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.*'
          host: windows
          target: desktop
          arch: win64_msvc2022_64
          modules: 'qtquickcontrols2'
          cache: true

      # Set up MSVC environment (cl.exe, link.exe, etc.) for Ninja
      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # Python is pre-installed on GitHub-hosted Windows runners.
      # Lua and Hunspell are optional; skip them for the CI build.

      - name: Configure
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel

      - name: Deploy Qt
        shell: pwsh
        run: |
          $exe = "build\src\nuchat.exe"
          if (Test-Path $exe) {
            windeployqt --qmldir qml --no-translations $exe
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nuchat-windows
          path: build/src/
