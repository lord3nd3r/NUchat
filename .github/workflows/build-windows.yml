name: Windows

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Qt6 via aqtinstall
        shell: pwsh
        run: |
          pip install aqtinstall
          aqt install-qt windows desktop 6.8.3 win64_msvc2022_64 --outputdir "C:\Qt"
          Add-Content $env:GITHUB_PATH "C:\Qt\6.8.3\msvc2022_64\bin"
          Add-Content $env:GITHUB_ENV "Qt6_DIR=C:\Qt\6.8.3\msvc2022_64\lib\cmake\Qt6"
          Add-Content $env:GITHUB_ENV "CMAKE_PREFIX_PATH=C:\Qt\6.8.3\msvc2022_64"

      # Set up MSVC environment (cl.exe, link.exe, etc.) for Ninja
      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # Python is pre-installed on GitHub-hosted Windows runners.
      # Lua and Hunspell are optional; skip them for the CI build.

      - name: Configure
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel

      - name: Deploy Qt
        shell: pwsh
        run: |
          $exe = "build\src\nuchat.exe"
          if (Test-Path $exe) {
            windeployqt --qmldir qml --no-translations $exe
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nuchat-windows
          path: build/src/
