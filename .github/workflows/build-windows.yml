name: Windows

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.*'
          host: windows
          target: desktop
          modules: 'qtquickcontrols2 qtdeclarative qtquick'
          cache: true

      # Python is pre-installed on the runner. Lua and Hunspell are optional.
      # The action automatically sets up Qt6_DIR, PATH, and the environment.

      - name: Configure
        run: cmake -B build -A x64 -DCMAKE_BUILD_TYPE=Release -DPython3_FOUND=OFF

      - name: Build
        run: cmake --build build --config Release --parallel --verbose

      - name: Deploy Qt
        shell: pwsh
        run: |
          $exe = "build\src\Release\nuchat.exe"
          if (Test-Path $exe) {
            windeployqt --qmldir qml --no-translations $exe
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nuchat-windows
          path: build/src/Release/
