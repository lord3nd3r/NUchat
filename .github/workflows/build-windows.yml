name: Windows

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.*'
          host: windows
          target: desktop
          modules: 'qtquickcontrols2 qtdeclarative qtquick'
          tools: 'qttools'
          cache: true

      # Python is pre-installed on the runner. Lua and Hunspell are optional.
      # The action automatically sets up Qt6_DIR, PATH, and the environment.

      - name: Configure
        run: cmake -B build -A x64 -DCMAKE_BUILD_TYPE=Release -DPython3_FOUND=OFF

      - name: Build
        run: cmake --build build --config Release --parallel --verbose

      - name: Deploy Qt
        shell: pwsh
        continue-on-error: true
        run: |
          # Find the built exe (VS generator puts it in Release subdir)
          $exe = Get-ChildItem -Path "build\src\Release\nuchat.exe" -ErrorAction SilentlyContinue
          if (-not $exe) {
            $exe = Get-ChildItem -Path "build\src\*\nuchat.exe" -Recurse | Select-Object -First 1
          }
          if ($exe) {
            $exePath = $exe.FullName
            $qmlDir = Resolve-Path "qml"
            Write-Host "Found exe at: $exePath"
            Write-Host "QML dir: $qmlDir"
            # Standard flags for Qt6 QML apps
            windeployqt --qmldir $qmlDir --no-translations --no-opengl --no-system-d3d-compiler --no-compiler-runtime $exePath
            Write-Host "Successfully deployed Qt dependencies next to the exe."
          } else {
            Write-Warning "Could not find nuchat.exe in build output. Continuing anyway."
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nuchat-windows
          path: build/src/Release/
