name: Windows

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Qt6 via aqtinstall
        shell: pwsh
        run: |
          pip install aqtinstall
          aqt install-qt windows desktop 6.8.3 win64_msvc2022_64 --outputdir "C:\Qt"
          Add-Content $env:GITHUB_PATH "C:\Qt\6.8.3\msvc2022_64\bin"
          Add-Content $env:GITHUB_ENV "Qt6_DIR=C:\Qt\6.8.3\msvc2022_64\lib\cmake\Qt6"
          Add-Content $env:GITHUB_ENV "CMAKE_PREFIX_PATH=C:\Qt\6.8.3\msvc2022_64"

      - name: Verify Qt install
        shell: pwsh
        run: |
          Write-Host "Qt6_DIR: $env:Qt6_DIR"
          Write-Host "CMAKE_PREFIX_PATH: $env:CMAKE_PREFIX_PATH"
          Test-Path "C:\Qt\6.8.3\msvc2022_64\lib\cmake\Qt6\Qt6Config.cmake"
          Test-Path "C:\Qt\6.8.3\msvc2022_64\lib\cmake\Qt6Quick\Qt6QuickConfig.cmake"
          Test-Path "C:\Qt\6.8.3\msvc2022_64\lib\cmake\Qt6QuickControls2\Qt6QuickControls2Config.cmake"

      # Python is pre-installed. Lua and Hunspell are optional (skipped for speed).
      # Use the Visual Studio generator — it locates MSVC from the registry.

      - name: Configure
        run: cmake -B build -A x64 -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --parallel --verbose

      - name: Deploy Qt
        shell: pwsh
        run: |
          $exe = "build\src\Release\nuchat.exe"
          if (Test-Path $exe) {
            windeployqt --qmldir qml --no-translations $exe
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nuchat-windows
          path: build/src/Release/
