name: macOS

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew update
          brew install lua hunspell

      - name: Install Qt6 via aqtinstall
        run: |
          pip3 install aqtinstall --break-system-packages
          aqt install-qt mac desktop 6.8.3 clang_64 --outputdir "$HOME/Qt"
          echo "$HOME/Qt/6.8.3/macos/bin" >> "$GITHUB_PATH"
          echo "Qt6_DIR=$HOME/Qt/6.8.3/macos/lib/cmake/Qt6" >> "$GITHUB_ENV"
          echo "CMAKE_PREFIX_PATH=$HOME/Qt/6.8.3/macos" >> "$GITHUB_ENV"

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel $(sysctl -n hw.logicalcpu)

      - name: Deploy Qt (.app bundle)
        run: |
          APP="build/src/nuchat.app"
          if [ -d "$APP" ]; then
            macdeployqt "$APP" -qmldir=qml
          fi

      - name: Package DMG
        run: |
          APP="build/src/nuchat.app"
          if [ -d "$APP" ]; then
            hdiutil create -volname NUchat -srcfolder "$APP" \
              -ov -format UDZO nuchat-macos.dmg
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nuchat-macos
          path: nuchat-macos.dmg
