name: Windows

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python (for aqtinstall)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.5.3'
          host: windows
          target: desktop
          cache: false

      - name: Install NSIS
        run: choco install nsis

      # Python is pre-installed on the runner. Lua and Hunspell are optional.
      # The action automatically sets up Qt6_DIR, PATH, and the environment.

      - name: Configure
        run: |
          cmake -B build -A x64 -DCMAKE_DISABLE_FIND_PACKAGE_Python3=ON

      - name: Build
        run: |
          cmake --build build --config Release --parallel --verbose

      - name: Package with CPack
        working-directory: build
        run: |
          cpack -C Release -G NSIS

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nuchat-windows-installer
          path: build/NUchat_*_Windows_x64.exe
          if-no-files-found: warn
